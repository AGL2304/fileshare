services:
  postgres:
    image: postgres:16-alpine
    container_name: fileshare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fileshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fileshare_pass}
      POSTGRES_DB: ${POSTGRES_DB:-fileshare_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/migration.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fileshare} -d ${POSTGRES_DB:-fileshare_db}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fileshare_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fileshare_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fileshare}:${POSTGRES_PASSWORD:-fileshare_pass}@postgres:5432/${POSTGRES_DB:-fileshare_db}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod_use_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5174}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_PATH: /app/uploads
      APP_URL: ${APP_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fileshare.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234}
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fileshare_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '5174:80'

volumes:
  postgres_data:
  redis_data:
  uploads_data:
